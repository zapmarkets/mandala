[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "@delegation-framework/=lib/delegation-framework/src/",
    "@erc7579/=lib/delegation-framework/lib/erc7579-implementation/src/",
    "@account-abstraction/=lib/delegation-framework/lib/account-abstraction/contracts/"
]

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
base_sepolia = "https://sepolia.base.org"
base_mainnet = "https://mainnet.base.org"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
base_mainnet = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
